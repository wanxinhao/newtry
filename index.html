<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万物共生 - 生命演化模拟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-dark: #08090d;
  --bg-panel: rgba(12, 14, 20, 0.85);
  --bg-card: rgba(255,255,255,0.025);
  --bg-card-hover: rgba(255,255,255,0.055);
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.14);
  --accent: #4ecdc4;
  --accent-glow: rgba(78,205,196,0.25);
  --accent2: #ff6b6b;
  --accent2-glow: rgba(255,107,107,0.2);
  --accent3: #ffe66d;
  --accent3-glow: rgba(255,230,109,0.2);
  --text: #e4e4e7;
  --text-dim: #71717a;
  --text-muted: #52525b;
  --plant: #4ade80;
  --herb: #60a5fa;
  --carn: #f87171;
  --decomp: #c084fc;
  --glass: rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.08);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 20px var(--accent-glow);
  --transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  background: var(--bg-dark);
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(78,205,196,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(255,107,107,0.03) 0%, transparent 60%);
  color: var(--text);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#app {
  display: grid;
  grid-template-columns: 280px 1fr 300px;
  grid-template-rows: 52px 1fr 40px;
  height: 100vh;
  gap: 0;
}

/* ===== HEADER ===== */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--bg-panel);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

.header h1 {
  font-size: 15px;
  font-weight: 600;
  background: linear-gradient(135deg, var(--accent), #a78bfa, var(--accent3));
  background-size: 200% 200%;
  animation: gradient-shift 8s ease infinite;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 3px;
}

@keyframes gradient-shift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.header-controls {
  display: flex;
  gap: 6px;
  align-items: center;
}

.header-controls button {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: var(--text-dim);
  padding: 5px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  font-weight: 500;
  transition: all var(--transition);
  backdrop-filter: blur(8px);
}

.header-controls button:hover {
  background: rgba(255,255,255,0.08);
  border-color: var(--border-hover);
  color: var(--text);
  transform: translateY(-1px);
}

.header-controls button.active {
  background: rgba(78,205,196,0.1);
  border-color: rgba(78,205,196,0.3);
  color: var(--accent);
  box-shadow: 0 0 12px rgba(78,205,196,0.1);
}

.speed-control {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: 8px;
  padding-left: 12px;
  border-left: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 500;
}

.speed-control input[type="range"] {
  width: 72px;
  height: 3px;
  accent-color: var(--accent);
  cursor: pointer;
  opacity: 0.7;
  transition: opacity var(--transition);
}

.speed-control input[type="range"]:hover {
  opacity: 1;
}

/* ===== PANELS ===== */
.left-panel, .right-panel {
  background: var(--bg-panel);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  overflow-y: auto;
  padding: 14px;
}

.left-panel {
  border-right: 1px solid var(--border);
}

.right-panel {
  border-left: 1px solid var(--border);
}

.panel-section {
  margin-bottom: 18px;
}

.panel-section h3 {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}

.panel-section h3::before {
  content: '';
  width: 3px;
  height: 10px;
  border-radius: 2px;
  background: var(--accent);
  opacity: 0.6;
}

/* ===== SPECIES CARDS ===== */
.species-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.species-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 60%, rgba(78,205,196,0.03));
  opacity: 0;
  transition: opacity var(--transition);
}

.species-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  transform: translateX(2px);
}

.species-card:hover::before {
  opacity: 1;
}

.species-card .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 8px;
  vertical-align: middle;
  box-shadow: 0 0 6px currentColor;
}

.species-card .name {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text);
}

.species-card .info {
  font-size: 10.5px;
  color: var(--text-dim);
  margin-top: 3px;
  margin-left: 15px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: -0.2px;
}

.species-card .pop-bar {
  height: 2px;
  background: rgba(255,255,255,0.04);
  border-radius: 1px;
  margin-top: 6px;
  margin-left: 15px;
  overflow: hidden;
}

.species-card .pop-bar .fill {
  height: 100%;
  border-radius: 1px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 8px currentColor;
}

/* ===== ENV STATS ===== */
.env-stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  font-size: 11.5px;
}

.env-stat .label {
  color: var(--text-dim);
  font-weight: 400;
}

.env-stat .value {
  font-weight: 500;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text);
  letter-spacing: -0.3px;
}

/* ===== CANVAS ===== */
.canvas-area {
  position: relative;
  overflow: hidden;
  background: #06080c;
  border: 1px solid var(--border);
  margin: 6px;
  border-radius: var(--radius-lg);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
}

.canvas-overlay {
  position: absolute;
  top: 14px;
  left: 14px;
  display: flex;
  gap: 8px;
  z-index: 5;
}

.overlay-badge {
  background: rgba(12, 14, 20, 0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 4px 10px;
  border-radius: var(--radius-full);
  font-size: 10.5px;
  color: var(--text-dim);
  font-weight: 500;
  box-shadow: var(--shadow-sm);
}

.overlay-badge span {
  color: var(--text);
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
}

/* ===== EVENT LOG ===== */
.event-log {
  max-height: 280px;
  overflow-y: auto;
  font-size: 10.5px;
  line-height: 1.7;
}

.event-log .event {
  padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.025);
  display: flex;
  gap: 8px;
  align-items: baseline;
  transition: background var(--transition);
}

.event-log .event:hover {
  background: rgba(255,255,255,0.02);
}

.event-log .event .time {
  color: var(--text-muted);
  white-space: nowrap;
  min-width: 36px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
}

.event-log .event .msg { color: var(--text-dim); }
.event-log .event.birth .msg { color: var(--plant); }
.event-log .event.death .msg { color: var(--accent2); }
.event-log .event.evolution .msg { color: var(--accent3); }
.event-log .event.symbiosis .msg { color: var(--accent); }

.event-log .event.birth .msg::before { content: ''; }
.event-log .event.death .msg::before { content: ''; }

/* ===== STATUS BAR ===== */
.status-bar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--bg-panel);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  font-size: 10.5px;
  color: var(--text-muted);
  font-weight: 500;
}

.status-bar .left,
.status-bar .right {
  display: flex;
  gap: 16px;
  align-items: center;
}

.status-bar .indicator {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
  margin-right: 5px;
  animation: pulse 2.5s ease-in-out infinite;
  box-shadow: 0 0 8px var(--accent-glow);
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent-glow); }
  50% { opacity: 0.5; box-shadow: 0 0 4px var(--accent-glow); }
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
  background: rgba(255,255,255,0.15);
}

/* ===== SELECTION ===== */
::selection {
  background: rgba(78,205,196,0.2);
  color: var(--text);
}

/* ===== SETTINGS PANEL ===== */
.settings-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 250ms ease;
}

.settings-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.settings-panel {
  position: fixed;
  top: 0;
  right: -420px;
  width: 400px;
  height: 100vh;
  background: rgba(12, 14, 20, 0.95);
  backdrop-filter: blur(30px) saturate(1.3);
  -webkit-backdrop-filter: blur(30px) saturate(1.3);
  border-left: 1px solid var(--border);
  z-index: 101;
  overflow-y: auto;
  padding: 24px;
  transition: right 300ms cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: -8px 0 30px rgba(0,0,0,0.4);
}

.settings-panel.open {
  right: 0;
}

.settings-panel h2 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.settings-panel .close-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}

.settings-panel .close-btn:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border-color: var(--border-hover);
}

.settings-group {
  margin-bottom: 20px;
}

.settings-group h4 {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  gap: 12px;
}

.settings-row label {
  font-size: 11.5px;
  color: var(--text-dim);
  flex-shrink: 0;
  min-width: 100px;
}

.settings-row .input-group {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  justify-content: flex-end;
}

.settings-row input[type="range"] {
  width: 100px;
  height: 3px;
  accent-color: var(--accent);
  cursor: pointer;
}

.settings-row input[type="number"] {
  width: 60px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 3px 6px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  text-align: right;
  outline: none;
  transition: border-color var(--transition);
}

.settings-row input[type="number"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}

.settings-row .unit {
  font-size: 10px;
  color: var(--text-muted);
  min-width: 24px;
}

.settings-section-title {
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  margin: 16px 0 8px;
  padding-left: 8px;
  border-left: 2px solid var(--accent);
}

.species-settings {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  margin-bottom: 8px;
}

.species-settings .sp-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 12px;
  font-weight: 500;
}

.species-settings .sp-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
}

.settings-apply-btn {
  width: 100%;
  padding: 10px;
  background: rgba(78,205,196,0.12);
  border: 1px solid rgba(78,205,196,0.3);
  border-radius: var(--radius-md);
  color: var(--accent);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  margin-top: 16px;
  letter-spacing: 0.5px;
}

.settings-apply-btn:hover {
  background: rgba(78,205,196,0.2);
  border-color: rgba(78,205,196,0.5);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(78,205,196,0.15);
}

.settings-reset-btn {
  width: 100%;
  padding: 8px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text-dim);
  font-size: 11px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  margin-top: 8px;
}

.settings-reset-btn:hover {
  background: rgba(255,107,107,0.08);
  border-color: rgba(255,107,107,0.3);
  color: var(--accent2);
}
</style>
</head>
<body>
<script type="module">
import init from './pkg/ecosystem_sim.js';
init();
</script>
</body>
</html>
